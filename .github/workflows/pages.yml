name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  pull_request:
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  schedule:
    - cron: '0 7 * * 1'  # Monday 07:00 UTC (staggered after daily-refresh 06:00)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install library dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      # The site tree (Astro/Starlight/vite/esbuild) carries its own transitive CVE
      # surface, separate from the root engine. Gate it here so it can't silently
      # re-accumulate advisories (esbuild pinned via overrides to ^0.28.1).
      - name: Audit site dependencies
        working-directory: site
        run: npm audit --audit-level=high

      # On pull_request we only verify (audit + build) — skip the live fetch, the
      # stats commit/push, the Pages artifact upload, and the deploy job. Those run
      # only on push to main / schedule / manual dispatch.
      - name: Fetch live stats
        if: github.event_name != 'pull_request'
        working-directory: site
        run: npm run fetch-stats

      - name: Commit fresh stats back to repo
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/src/data/stats.json site/src/data/snapshots.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update stats snapshot [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Build site
        working-directory: site
        run: npm run build

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        if: github.event_name != 'pull_request'
        with:
          path: site/dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
