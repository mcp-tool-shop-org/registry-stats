name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + Sigstore provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - run: npm run build --if-present

      - run: npm test --if-present

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22 bundles npm 10.9.x,
      # so upgrade the global npm before publishing.
      - name: Upgrade npm for Trusted Publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Publish to npm (Trusted Publishing / OIDC)
        # Auth is via npm Trusted Publishing bound to this workflow (release.yml) —
        # intentionally NO NODE_AUTH_TOKEN. npm detects the GitHub OIDC environment,
        # mints a short-lived token, and attaches Sigstore build provenance.
        run: npm publish --provenance --access public
