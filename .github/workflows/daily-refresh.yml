name: Daily Refresh

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install library dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      # ── Data Pipeline ─────────────────────────────────────────
      # No continue-on-error: a hard fetch failure must fail the run so stale
      # data is never masked by a green check. The data files are untouched by a
      # crash, so a failed run commits nothing.
      - name: Fetch live stats
        id: fetch
        working-directory: site
        run: npm run fetch-stats

      # Guard: catch a soft failure (script exited 0 but wrote stale data) by
      # checking stats.json freshness. Fails the job if fetchedAt is older than 26h.
      - name: Verify stats freshness
        run: |
          node -e '
            const fs = require("fs");
            const p = "site/src/data/stats.json";
            if (!fs.existsSync(p)) { console.error("::error::stats.json missing"); process.exit(1); }
            const fetchedAt = new Date(JSON.parse(fs.readFileSync(p, "utf8")).fetchedAt);
            const ageH = (Date.now() - fetchedAt.getTime()) / 3.6e6;
            console.log(`stats.json fetchedAt=${fetchedAt.toISOString()} age=${ageH.toFixed(1)}h`);
            if (!(ageH < 26)) { console.error(`::error::stats.json is stale (${ageH.toFixed(1)}h old)`); process.exit(1); }
          '

      # Surface any failure (fetch crash or stale data) as a single tracked issue
      # so a silently-failing daily run is visible without spamming new issues.
      - name: Open/update tracking issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = 'Daily refresh failing';
            const body = `The Daily Refresh workflow failed on ${new Date().toISOString()}.\n\n` +
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
              `Likely cause: live stats fetch failed or wrote stale data. Investigate the registry APIs and re-run.`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'daily-refresh',
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['daily-refresh'],
              });
            }

      # ── Quality Gate ──────────────────────────────────────────
      - name: Run tests
        run: npm test

      # ── Commit ────────────────────────────────────────────────
      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add site/src/data/stats.json site/src/data/snapshots.json site/src/data/history.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: daily stats refresh [skip ci]"
              git pull --rebase --autostash origin main
              git push
            else
              echo "No stats changes to commit."
            fi
          else
            echo "No changes to commit."
          fi
