name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsup.config.ts"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsup.config.ts"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      # Full-tree audit (root, dev + prod). The dev-toolchain esbuild advisories that
      # forced the temporary `--omit=dev` scope in v3.3.0 are resolved in v3.3.1 via an
      # esbuild `overrides` pin (^0.28.1) + tsup 8.5 + vitest 4 — so the whole tree is
      # audited again. The published package still has ZERO runtime dependencies.
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run
